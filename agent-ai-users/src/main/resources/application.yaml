spring:
  application:
    name: agent-ai-users
  config:
    import: optional:file:.env[.properties]
  sql:
    init:
      platform: postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    generate-ddl: true
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_agent_db
    username: user_postgres
    password: password

server:
  port: 8082

client:
  url: http://localhost:4200

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 36000000