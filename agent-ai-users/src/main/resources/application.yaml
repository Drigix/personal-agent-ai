spring:
  application:
    name: agent-ai-users
  sql:
    init:
      platform: postgres
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: PostgreSQLDialect
    show-sql: true
    generate-ddl: true
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_agent_db
    username: user_postgres
    password: password

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 36000000